services:
  plex:
    container_name: plex
    image: lscr.io/linuxserver/plex:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
      - ADVERTISE_IP=http://192.168.0.126:32400
      - VERSION=docker
      - PLEX_CLAIM=claim-ymhbxQ1mNKnNR1cJDQNF
    volumes:
      - /mnt/deadpool/media:/data:ro
      - /mnt/flash/configs/plex:/config
    tmpfs:
      - /transcode

volumes:
  plex_config: